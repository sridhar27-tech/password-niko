<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecurePass | Premium Password Generator</title>
    <meta name="description" content="Generate secure, random passwords with a real-time strength indicator using Crypto API.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>SecurePass</h1>
            <p>Generate bulletproof credentials instantly.</p>
        </header>

        <main class="generator-card">
            <section class="result-container">
                <div class="password-display" id="passwordOutput" contenteditable="true" spellcheck="false">P4ssw0rd!_2024</div>
                <button class="icon-btn" id="copyBtn" aria-label="Copy to Clipboard">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    <span class="tooltip">Copied!</span>
                </button>
            </section>

            <div class="strength-indicator">
                <div class="bars">
                    <div class="bar" data-level="1"></div>
                    <div class="bar" data-level="2"></div>
                    <div class="bar" data-level="3"></div>
                    <div class="bar" data-level="4"></div>
                </div>
                <span id="strengthText">Strength: Medium</span>
            </div>

            <section class="controls">
                <div class="control-group">
                    <div class="label-row">
                        <label for="lengthSlider">Password Length</label>
                        <span id="lengthVal">16</span>
                    </div>
                    <input type="range" id="lengthSlider" min="8" max="64" value="16">
                </div>

                <div class="options-grid">
                    <label class="checkbox-container">
                        <input type="checkbox" id="uppercase" checked>
                        <span class="checkmark"></span>
                        Include Uppercase
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="lowercase" checked>
                        <span class="checkmark"></span>
                        Include Lowercase
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="numbers" checked>
                        <span class="checkmark"></span>
                        Include Numbers
                    </label>
                    <label class="checkbox-container">
                        <input type="checkbox" id="symbols" checked>
                        <span class="checkmark"></span>
                        Include Symbols
                    </label>
                </div>

                <button class="generate-btn" id="generateBtn">
                    Generate Secure Password
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path><polyline points="23 2 23 7 18 7"></polyline><path d="M9 18l3 3 6-6"></path></svg>
                </button>
            </section>
        </main>

        <footer>
            <p>Built with Web Crypto API for maximum security.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
